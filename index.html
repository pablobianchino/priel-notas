    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dragging { opacity: 0.4; transform: scale(0.98); }
        .column { min-height: 150px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #334155 !important; background-color: transparent; padding: 8px 0 !important; margin-bottom: 8px; }
        .ql-container.ql-snow { border: none !important; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        
        #editor-container .ql-editor, #edit-editor-container .ql-editor { min-height: 200px; max-height: 40vh; overflow-y: auto; }
        .ql-editor.ql-blank::before { color: #64748b; font-style: normal; left: 0; }
        .ql-snow .ql-stroke { stroke: #cbd5e1; }

        .nota-contenido ul { list-style-type: disc; padding-left: 1.25rem; margin-top: 0.25rem; }
        .nota-contenido ol { list-style-type: decimal; padding-left: 1.25rem; margin-top: 0.25rem; }
        .nota-contenido blockquote { border-left: 3px solid #475569; padding-left: 1rem; color: #94a3b8; margin: 0.5rem 0; font-style: italic; }
        .nota-contenido p { margin-bottom: 0.25rem; }
        .nota-contenido p:last-child { margin-bottom: 0; }
    </style>
</head>
<body class="bg-[#0f1115] h-[100dvh] flex flex-col text-slate-200 overflow-hidden">

                    <label class="cursor-pointer select-none"><input type="checkbox" class="etiqueta-editar peer hidden" value="Show"><div class="px-2 py-1 rounded text-xs font-medium border border-slate-700 text-slate-400 peer-checked:bg-blue-900/50 peer-checked:text-blue-300 peer-checked:border-blue-700/50 transition-all hover:bg-slate-800">Show</div></label>
                    <label class="cursor-pointer select-none"><input type="checkbox" class="etiqueta-editar peer hidden" value="Rutina"><div class="px-2 py-1 rounded text-xs font-medium border border-slate-700 text-slate-400 peer-checked:bg-green-900/50 peer-checked:text-green-300 peer-checked:border-green-700/50 transition-all hover:bg-slate-800">Rutina</div></label>
                    <label class="cursor-pointer select-none"><input type="checkbox" class="etiqueta-editar peer hidden" value="Salud Mental"><div class="px-2 py-1 rounded text-xs font-medium border border-slate-700 text-slate-400 peer-checked:bg-teal-900/50 peer-checked:text-teal-300 peer-checked:border-teal-700/50 transition-all hover:bg-slate-800">Salud Mental</div></label>
                    <label class="cursor-pointer select-none"><input type="checkbox" class="etiqueta-editar peer hidden" value="Ensamble"><div class="px-2 py-1 rounded text-xs font-medium border border-slate-700 text-slate-400 peer-checked:bg-indigo-900/50 peer-checked:text-indigo-300 peer-checked:border-indigo-700/50 transition-all hover:bg-slate-800">Ensamble</div></label>

                    <label class="cursor-pointer select-none"><input type="checkbox" class="etiqueta-editar peer hidden" value="Otros"><div class="px-2 py-1 rounded text-xs font-medium border border-slate-700 text-slate-400 peer-checked:bg-slate-700 peer-checked:text-slate-200 peer-checked:border-slate-500 transition-all hover:bg-slate-800">Otros</div></label>
                    <div class="h-5 w-px bg-slate-700 mx-1 hidden md:block"></div>
                    <label class="cursor-pointer select-none"><input type="checkbox" id="check-urgente-editar" class="peer hidden"><div class="px-2 py-1 rounded text-xs font-bold border border-red-500/20 text-red-400 bg-red-500/5 peer-checked:bg-red-900/80 peer-checked:text-red-200 peer-checked:border-red-600 transition-all hover:bg-red-500/10">🚨 Urgente</div></label>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 shrink-0 bg-[#1a1d24] p-4 rounded-xl border border-slate-800 shadow-sm">
            <h1 class="text-xl font-bold text-slate-100 tracking-wide flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Priel Notas

            <div class="flex gap-4 items-center w-full md:w-auto justify-between md:justify-end">
                <button onclick="logout()" class="text-slate-400 hover:text-slate-200 text-sm font-medium order-1 md:order-none">Cerrar Sesión</button>
                <button onclick="abrirModalCrear()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-lg font-medium text-sm shadow-md transition-colors flex items-center gap-2 order-2 md:order-none">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>

        <div class="flex flex-col md:flex-row gap-4 overflow-y-auto md:overflow-x-auto pb-4 flex-1 items-start h-full scroll-smooth">
            <div id="wrapper-todo" class="bg-[#15181e] rounded-xl w-full md:min-w-[300px] md:w-80 flex flex-col md:max-h-full border border-slate-800/50">
                <div class="flex items-center justify-between p-3 cursor-pointer md:cursor-default bg-slate-800/30 rounded-t-xl" onclick="toggleMobile('todo')">
                    <h2 class="font-semibold text-yellow-200 text-sm select-none">To Do</h2>
                    <span id="count-todo" class="bg-slate-800 text-slate-400 text-xs px-2 py-0.5 rounded-full font-medium">0</span>
                </div>

            </div>
            <div id="wrapper-general" class="bg-[#15181e] rounded-xl w-full md:min-w-[300px] md:w-80 flex flex-col md:max-h-full border border-slate-800/50">

                <div class="flex items-center justify-between p-3 cursor-pointer md:cursor-default bg-slate-800/30 rounded-t-xl" onclick="toggleMobile('progreso')">
                    <h2 class="font-semibold text-blue-400 text-sm select-none">En Progreso</h2>
                    <span id="count-progreso" class="bg-slate-800 text-slate-400 text-xs px-2 py-0.5 rounded-full font-medium">0</span>
                </div>
                <div id="progreso" class="column hidden md:flex flex-col gap-3 p-3 overflow-y-auto" ondragover="permitirSoltar(event)" ondrop="soltar(event)"></div>
            </div>
            <div id="wrapper-cerrado" class="bg-[#15181e] rounded-xl w-full md:min-w-[300px] md:w-80 flex flex-col md:max-h-full border border-slate-800/50">
                <div class="flex items-center justify-between p-3 cursor-pointer md:cursor-default bg-slate-800/30 rounded-t-xl" onclick="toggleMobile('cerrado')">
                    <h2 class="font-semibold text-green-400 text-sm select-none">Cerrado</h2>

                </div>

            </div>

    <script>
        const supabaseUrl = 'https://uzqkdeijzqyruqscyivb.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6cWtkZWlqenF5cnVxc2N5aXZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjA1NjMsImV4cCI6MjA5MjA5NjU2M30.YbjZy5tz6TNStXl9-OMscv4Ay64A5_xrFf_pZiNBaP4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let notas = [];
        let user = null;
        let idNotaEditando = null;

        const quillConfig = {
            theme: 'snow',
            placeholder: 'Escribe el texto de tu nota...',
            modules: { toolbar: [ ['bold', 'italic', 'underline', 'strike'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean'] ] }
        };

        var quill = new Quill('#editor-container', quillConfig);
        var editQuill = new Quill('#edit-editor-container', quillConfig);

        const tableros = ['todo', 'general', 'progreso', 'cerrado'];
        const coloresEtiquetas = {
            'Mandala': 'bg-purple-900/50 text-purple-300 border border-purple-700/50',
            'Show': 'bg-blue-900/50 text-blue-300 border border-blue-700/50',
            'Rutina': 'bg-green-900/50 text-green-300 border border-green-700/50',
            'Salud Mental': 'bg-teal-900/50 text-teal-300 border border-teal-700/50',
            'Urgente': 'bg-red-900/80 text-red-200 border border-red-600',
            'Ensamble': 'bg-indigo-900/50 text-indigo-300 border border-indigo-700/50',
            'Metas Personales': 'bg-orange-900/50 text-orange-300 border border-orange-700/50',
            'Astrología': 'bg-yellow-900/40 text-yellow-300 border border-yellow-700/50',
            'Otros': 'bg-slate-800 text-slate-300 border border-slate-600'
        };

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                user = session.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                cargarNotas();
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                const errEl = document.getElementById('auth-error');
                errEl.innerText = error.message;
                errEl.classList.remove('hidden');
            } else {
                user = data.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                cargarNotas();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            user = null;
            notas = [];
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        async function cargarNotas() {
            const { data, error } = await supabaseClient.from('notas').select('*').order('created_at', { ascending: false });
            if (!error) {
                notas = data;
                renderizarUI();
            }
        }

        function abrirModalCrear() {
            document.getElementById('modal-crear').classList.remove('hidden');
            setTimeout(() => quill.focus(), 100);
        }

        function cerrarModalCrear() {
            document.getElementById('modal-crear').classList.add('hidden');
            quill.setContents([]);
            document.getElementById('titulo-crear').value = '';
            document.getElementById('check-urgente-crear').checked = false;
            document.querySelectorAll('.etiqueta-crear').forEach(cb => cb.checked = false);
        }

        async function agregarNota() {
            const textoPlano = quill.getText().trim();
            const tituloInput = document.getElementById('titulo-crear').value.trim();
            
            if (textoPlano === '' && tituloInput === '') return;

            const tituloFinal = tituloInput || `Nota ${notas.length + 1}`;
            const contenidoHtml = quill.root.innerHTML;
            
            const etiquetasSeleccionadas = Array.from(document.querySelectorAll('.etiqueta-crear:checked')).map(cb => cb.value);
            const checkUrgente = document.getElementById('check-urgente-crear');
            let tableroInicial = 'general';

            if (checkUrgente.checked) {
                etiquetasSeleccionadas.push('Urgente');
                tableroInicial = 'todo';
            }

            const nuevaNota = {
                titulo: tituloFinal,
                texto: contenidoHtml,
                tablero: tableroInicial,
                etiquetas: etiquetasSeleccionadas,
                user_id: user.id
            };

            const { data, error } = await supabaseClient.from('notas').insert([nuevaNota]).select();
            
            if (!error && data) {
                notas.unshift(data[0]); 
                renderizarUI();
                cerrarModalCrear();
            } else {
                console.error("Error al guardar la nota:", error);
            }
        }

        async function eliminarNota(id, event) {
            event.stopPropagation();
            notas = notas.filter(nota => nota.id !== id);
            renderizarUI(); 
            await supabaseClient.from('notas').delete().eq('id', id); 
        }

        async function moverNota(id, nuevoTablero) {
            const index = notas.findIndex(n => n.id === id);
            if (index !== -1) {
                notas[index].tablero = nuevoTablero;
                renderizarUI(); 
                await supabaseClient.from('notas').update({ tablero: nuevoTablero }).eq('id', id); 
            }
        }

        function abrirModalEdicion(id) {
            const nota = notas.find(n => n.id === id);
            if (!nota) return;
            
            idNotaEditando = id;
            document.getElementById('titulo-editar').value = nota.titulo || '';
            editQuill.clipboard.dangerouslyPasteHTML(nota.texto || '');

            // Limpiar etiquetas del modal de edición
            document.querySelectorAll('.etiqueta-editar').forEach(cb => cb.checked = false);
            document.getElementById('check-urgente-editar').checked = false;

            // Marcar las etiquetas que tiene la nota
            if (nota.etiquetas) {
                nota.etiquetas.forEach(etq => {
                    if (etq === 'Urgente') {
                        document.getElementById('check-urgente-editar').checked = true;
                    } else {
                        const cb = document.querySelector(`.etiqueta-editar[value="${etq}"]`);
                        if (cb) cb.checked = true;
                    }
                });
            }

            document.getElementById('modal-edicion').classList.remove('hidden');
        }

        function cerrarModalEdicion() {
            document.getElementById('modal-edicion').classList.add('hidden');
            idNotaEditando = null;
            document.getElementById('titulo-editar').value = '';
            editQuill.setContents([]);
        }

        async function guardarEdicion() {
            if (!idNotaEditando) return;
            
            const tituloEditado = document.getElementById('titulo-editar').value.trim() || 'Nota sin título';
            const nuevoHtml = editQuill.root.innerHTML;
            
            const etiquetasSeleccionadas = Array.from(document.querySelectorAll('.etiqueta-editar:checked')).map(cb => cb.value);
            if (document.getElementById('check-urgente-editar').checked) {
                etiquetasSeleccionadas.push('Urgente');
            }

            const index = notas.findIndex(n => n.id === idNotaEditando);
            if (index !== -1) {
                notas[index].titulo = tituloEditado;
                notas[index].texto = nuevoHtml;
                notas[index].etiquetas = etiquetasSeleccionadas;
                
                renderizarUI(); 
                
                const { error } = await supabaseClient
                    .from('notas')
                    .update({ 
                        titulo: tituloEditado, 
                        texto: nuevoHtml, 
                        etiquetas: etiquetasSeleccionadas 
                    })
                    .eq('id', idNotaEditando);
                    
                if (error) console.error("Error al actualizar la nota:", error);
            }
            
            cerrarModalEdicion();
        }

        function limpiarFiltros() {
            document.getElementById('filtro-etiqueta').value = 'todas';
            document.getElementById('filtro-urgente').checked = false;
            document.getElementById('buscador').value = '';
            renderizarUI();
        }

        function renderizarUI() {
            const contadores = { general: 0, todo: 0, progreso: 0, cerrado: 0 };
            tableros.forEach(t => { const el = document.getElementById(t); if(el) el.innerHTML = ''; });

            const filtroUrgente = document.getElementById('filtro-urgente').checked;
            const filtroEtiqueta = document.getElementById('filtro-etiqueta').value;
            const terminoBusqueda = document.getElementById('buscador').value.toLowerCase();
            const tempDiv = document.createElement('div');
            
            const hayFiltrosActivos = filtroUrgente || filtroEtiqueta !== 'todas' || terminoBusqueda !== '';

            notas.forEach(nota => {
                if (filtroUrgente && (!nota.etiquetas || !nota.etiquetas.includes('Urgente'))) return;
                if (filtroEtiqueta === 'sin-etiqueta' && nota.etiquetas && nota.etiquetas.length > 0) return;
                if (filtroEtiqueta !== 'todas' && filtroEtiqueta !== 'sin-etiqueta' && (!nota.etiquetas || !nota.etiquetas.includes(filtroEtiqueta))) return;

                if (terminoBusqueda) {
                    tempDiv.innerHTML = nota.texto;
                    const textoPlano = tempDiv.innerText.toLowerCase();
                    const tituloPlano = (nota.titulo || '').toLowerCase();
                    const matcheaEtiquetas = nota.etiquetas ? nota.etiquetas.some(e => e.toLowerCase().includes(terminoBusqueda)) : false;
                    if (!textoPlano.includes(terminoBusqueda) && !tituloPlano.includes(terminoBusqueda) && !matcheaEtiquetas) return;
                }

                contadores[nota.tablero]++;

                const elemento = document.createElement('div');
                elemento.className = 'bg-[#1a1d24] p-3 rounded-lg shadow-sm border border-slate-700/60 cursor-grab hover:border-slate-500 transition-all group relative flex flex-col';
                elemento.draggable = true;
                elemento.id = nota.id;
                elemento.ondragstart = arrastrar;

                let htmlEtiquetas = '';
                if (nota.etiquetas && nota.etiquetas.length > 0) {
                    htmlEtiquetas = '<div class="flex flex-wrap gap-1.5 mb-2">';
                    nota.etiquetas.forEach(etq => {
                        const colorClase = coloresEtiquetas[etq] || coloresEtiquetas['Otros'];
                        htmlEtiquetas += `<span class="text-[10px] font-medium px-1.5 py-0.5 rounded ${colorClase}">${etq}</span>`;
                    });
                    htmlEtiquetas += '</div>';
                }

                const tituloMostrar = nota.titulo || 'Nota sin título';

                elemento.innerHTML = `
                    ${htmlEtiquetas}
                    <div onclick="abrirModalEdicion('${nota.id}')" class="cursor-pointer hover:bg-slate-800/50 rounded transition-colors -ml-1 p-1" title="Haz clic para editar">
                        <h4 class="font-bold text-slate-100 text-sm mb-1">${tituloMostrar}</h4>
                        <div class="text-slate-400 text-xs break-words nota-contenido leading-relaxed line-clamp-2 pointer-events-none">${nota.texto}</div>
                    </div>
                    <button onclick="eliminarNota('${nota.id}', event)" class="absolute top-2 right-2 text-slate-500 hover:text-red-400 bg-[#1a1d24] rounded-md opacity-0 group-hover:opacity-100 transition-opacity p-1.5 shadow-sm border border-slate-700/50" title="Eliminar nota">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;

                const contenedor = document.getElementById(nota.tablero);
                if (contenedor) contenedor.appendChild(elemento);
            });

            // Ocultar o mostrar tableros según los filtros y los contadores
            Object.keys(contadores).forEach(key => {
                const badge = document.getElementById(`count-${key}`);
                if(badge) badge.innerText = contadores[key];
                
                const wrapper = document.getElementById(`wrapper-${key}`);
                if (wrapper) {
                    if (hayFiltrosActivos && contadores[key] === 0) {
                        wrapper.style.display = 'none';
                    } else {
                        wrapper.style.display = '';
                    }
                }
            });
        }

        function arrastrar(event) { event.dataTransfer.setData("text", event.target.id); event.target.classList.add('dragging'); }
        function permitirSoltar(event) { event.preventDefault(); }
        function soltar(event) {
            event.preventDefault();
            const id = event.dataTransfer.getData("text");
            const elemento = document.getElementById(id);
            if (elemento) {
                elemento.classList.remove('dragging');
                let destino = event.target;
                while (!destino.classList.contains('column') && destino.parentElement) destino = destino.parentElement;
                
                if (destino.id && tableros.includes(destino.id)) {
                    moverNota(id, destino.id);
                }
            }
        }

        function toggleMobile(id) {
            if (window.innerWidth >= 768) return; 
            const col = document.getElementById(id);
            if (col.classList.contains('hidden')) {
                col.classList.remove('hidden'); col.classList.add('flex');
            } else {
                col.classList.add('hidden'); col.classList.remove('flex');
            }
        }

        if (window.innerWidth < 768) {
            document.getElementById('todo').classList.remove('hidden');
            document.getElementById('todo').classList.add('flex');
        }

        checkSession();
    </script>
</body>
</html>
