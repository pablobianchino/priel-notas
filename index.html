<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priel Notas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dragging { opacity: 0.4; transform: scale(0.98); }
        .column { min-height: 150px; position: relative; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #334155 !important; background-color: transparent; padding: 8px 0 !important; margin-bottom: 8px; }
        .ql-container.ql-snow { border: none !important; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
        
        #editor-container .ql-editor, #edit-editor-container .ql-editor { min-height: 200px; max-height: 40vh; overflow-y: auto; }
        .ql-editor.ql-blank::before { color: #64748b; font-style: normal; left: 0; }
        .ql-snow .ql-stroke { stroke: #cbd5e1; }
        .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill: #cbd5e1; }
        
        .nota-contenido ul { list-style-type: disc; padding-left: 1.25rem; margin-top: 0.25rem; }
        .nota-contenido ol { list-style-type: decimal; padding-left: 1.25rem; margin-top: 0.25rem; }
        .nota-contenido blockquote { border-left: 3px solid #475569; padding-left: 1rem; color: #94a3b8; margin: 0.5rem 0; font-style: italic; }
        .nota-contenido p { margin-bottom: 0.25rem; }
        .nota-contenido p:last-child { margin-bottom: 0; }
    </style>
</head>
<body class="bg-[#0f1115] h-[100dvh] flex flex-col text-slate-200 overflow-hidden relative">

    <div id="toast-back" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-slate-200 px-4 py-2 rounded-lg text-sm shadow-xl transition-opacity duration-300 opacity-0 pointer-events-none z-[200]">
        Presiona atrás de nuevo para salir
    </div>

    <div id="loading-screen" class="absolute inset-0 bg-[#0f1115] z-[100] flex flex-col items-center justify-center">
        <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <h2 class="text-sm font-bold text-slate-400 tracking-widest uppercase">Cargando Priel Notas...</h2>
    </div>

    <div id="auth-screen" class="absolute inset-0 bg-[#0f1115] z-50 hidden flex items-center justify-center p-4">
        <div class="bg-[#1a1d24] p-8 rounded-xl border border-slate-800 shadow-2xl w-full max-w-sm flex flex-col gap-4">
            <h2 class="text-xl font-bold text-slate-100 text-center mb-2">Ingresar a Priel Notas</h2>
            <input type="email" id="email" placeholder="Correo electrónico" class="bg-[#15181e] border border-slate-700 text-slate-200 p-3 rounded-lg outline-none focus:border-blue-500 w-full">
            <input type="password" id="password" placeholder="Contraseña" class="bg-[#15181e] border border-slate-700 text-slate-200 p-3 rounded-lg outline-none focus:border-blue-500 w-full">
            <button onclick="login()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium p-3 rounded-lg transition-colors mt-2">Iniciar Sesión</button>
            <p id="auth-error" class="text-red-400 text-sm text-center hidden"></p>
        </div>
    </div>

    <div id="modal-gestor-etiquetas" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-[#1a1d24] rounded-xl border border-slate-700 shadow-2xl w-full max-w-md flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-[#15181e]">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Gestor de Etiquetas</h3>
                <button onclick="cerrarGestorEtiquetas()" class="text-slate-400 hover:text-red-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4 bg-[#1a1d24] flex flex-col gap-4">
                <div class="flex gap-2">
                    <input type="text" id="nueva-etiqueta-nombre" placeholder="Nombre nueva etiqueta..." class="bg-[#15181e] border border-slate-700 text-slate-200 p-2 rounded-lg outline-none focus:border-blue-500 flex-1 text-sm">
                    <button onclick="crearEtiquetaBD()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Crear</button>
                </div>
                <div id="lista-gestor-etiquetas" class="flex flex-col gap-2 max-h-60 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <div id="modal-gestor-tableros" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-[#1a1d24] rounded-xl border border-slate-700 shadow-2xl w-full max-w-md flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-[#15181e]">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Gestor de Tableros</h3>
                <button onclick="cerrarGestorTableros()" class="text-slate-400 hover:text-red-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4 bg-[#1a1d24] flex flex-col gap-4">
                <div class="flex gap-2">
                    <input type="text" id="nuevo-tablero-nombre" placeholder="Nombre de tablero..." class="bg-[#15181e] border border-slate-700 text-slate-200 p-2 rounded-lg outline-none focus:border-blue-500 flex-1 text-sm">
                    <button onclick="crearTableroBD()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Crear</button>
                </div>
                <div id="lista-gestor-tableros" class="flex flex-col gap-2 max-h-60 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <div id="modal-crear" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-[#1a1d24] rounded-xl border border-slate-700 shadow-2xl w-full max-w-2xl flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex flex-col gap-3 bg-[#15181e]">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Nueva Nota</h3>
                    <button onclick="cerrarModalCrear()" class="text-slate-400 hover:text-red-400 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <input type="text" id="titulo-crear" placeholder="Título (Opcional)" class="bg-transparent text-xl font-bold text-slate-100 outline-none w-full border-b border-slate-700/50 pb-2 focus:border-blue-500 transition-colors">
            </div>
            <div class="p-5 bg-[#1a1d24]"><div id="editor-container" class="text-slate-200"></div></div>
            <div class="p-4 border-t border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 bg-[#15181e]">
                <div class="flex flex-wrap gap-2 items-center w-full md:w-auto" id="contenedor-etiquetas-crear"></div>
                <div class="flex gap-3 w-full md:w-auto mt-2 md:mt-0 shrink-0">
                    <button onclick="cerrarModalCrear()" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors flex-1 md:flex-none">Cancelar</button>
                    <button onclick="agregarNota()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium transition-colors shadow-md flex-1 md:flex-none">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-edicion" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-[#1a1d24] rounded-xl border border-slate-700 shadow-2xl w-full max-w-2xl flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex flex-col gap-3 bg-[#15181e]">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Editar Nota</h3>
                    <div class="flex items-center gap-3">
                        <select id="tablero-editar" class="bg-[#1a1d24] border border-slate-700 text-slate-300 text-sm rounded-lg px-2 py-1 outline-none focus:border-blue-500"></select>
                        <button onclick="cerrarModalEdicion()" class="text-slate-400 hover:text-red-400 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </div>
                <input type="text" id="titulo-editar" placeholder="Título de la nota..." class="bg-transparent text-xl font-bold text-slate-100 outline-none w-full border-b border-slate-700/50 pb-2 focus:border-blue-500 transition-colors">
            </div>
            <div class="p-5 bg-[#1a1d24]"><div id="edit-editor-container" class="text-slate-200"></div></div>
            <div class="p-4 border-t border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 bg-[#15181e]">
                <div class="flex flex-wrap gap-2 items-center w-full md:w-auto" id="contenedor-etiquetas-editar"></div>
                <div class="flex gap-3 w-full md:w-auto mt-2 md:mt-0 shrink-0">
                    <button onclick="cerrarModalEdicion()" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors flex-1 md:flex-none">Cancelar</button>
                    <button onclick="guardarEdicion()" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium transition-colors shadow-md flex-1 md:flex-none">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="flex-1 flex flex-col p-4 md:p-6 max-w-[1600px] mx-auto w-full gap-4 md:gap-6 hidden overflow-y-auto overflow-x-hidden relative">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 shrink-0 bg-[#1a1d24] p-4 rounded-xl border border-slate-800 shadow-sm">
            <h1 class="text-xl font-bold text-slate-100 tracking-wide flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Priel Notas
            </h1>
            <div class="flex gap-3 items-center w-full md:w-auto justify-between md:justify-end flex-wrap">
                <button onclick="logout()" class="text-slate-400 hover:text-slate-200 text-sm font-medium">Cerrar Sesión</button>
                <button onclick="abrirGestorTableros()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-medium text-sm shadow-md transition-colors flex items-center gap-2">
                    Tableros
                </button>
                <button onclick="abrirGestorEtiquetas()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-medium text-sm shadow-md transition-colors flex items-center gap-2">
                    Etiquetas
                </button>
                <button onclick="abrirModalCrear()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-medium text-sm shadow-md transition-colors flex items-center gap-2">
                    Nueva Nota
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row items-start md:items-center justify-between border-b border-slate-800 pb-2 gap-3 shrink-0">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider hidden md:block">TABLEROS</h2>
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <input type="text" id="buscador" oninput="renderizarUI()" placeholder="Buscar..." class="bg-[#1a1d24] border border-slate-700 text-slate-300 text-sm rounded-lg px-3 py-1.5 outline-none focus:border-blue-500 w-full md:w-48">
                <select id="filtro-etiqueta" onchange="renderizarUI()" class="bg-[#1a1d24] border border-slate-700 text-slate-300 text-sm rounded-lg px-3 py-1.5 outline-none focus:border-blue-500 flex-1 md:flex-none"></select>
                <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-slate-300 bg-[#1a1d24] border border-slate-700 px-3 py-1.5 rounded-lg"><input type="checkbox" id="filtro-urgente" onchange="renderizarUI()" class="w-4 h-4 accent-red-500 rounded"> Urgentes</label>
                <button onclick="limpiarFiltros()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 px-3 py-1.5 rounded-lg text-sm font-medium">Limpiar</button>
            </div>
        </div>

        <div id="tableros-container" class="flex flex-col md:flex-row gap-4 pb-4 flex-1 items-start min-h-0 w-full overflow-x-auto"></div>
    </div>

    <script>
        const supabaseUrl = 'https://uzqkdeijzqyruqscyivb.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6cWtkZWlqenF5cnVxc2N5aXZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjA1NjMsImV4cCI6MjA5MjA5NjU2M30.YbjZy5tz6TNStXl9-OMscv4Ay64A5_xrFf_pZiNBaP4';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let notas = [];
        let etiquetasBD = [];
        let tablerosBD = [];
        let user = null;
        let idNotaEditando = null;

        const quillConfig = {
            theme: 'snow',
            placeholder: 'Escribe el texto de tu nota...',
            modules: { toolbar: [ ['bold', 'italic', 'underline', 'strike'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean'] ] }
        };
        var quill = new Quill('#editor-container', quillConfig);
        var editQuill = new Quill('#edit-editor-container', quillConfig);

        const paletas = [
            'bg-purple-900/50 text-purple-300 border-purple-700/50',
            'bg-blue-900/50 text-blue-300 border-blue-700/50',
            'bg-green-900/50 text-green-300 border-green-700/50',
            'bg-teal-900/50 text-teal-300 border-teal-700/50',
            'bg-indigo-900/50 text-indigo-300 border-indigo-700/50',
            'bg-orange-900/50 text-orange-300 border-orange-700/50',
            'bg-yellow-900/40 text-yellow-300 border-yellow-700/50',
            'bg-pink-900/50 text-pink-300 border-pink-700/50'
        ];

        let backPressed = false;
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function(event) {
            if (!backPressed) {
                backPressed = true;
                history.pushState(null, null, location.href);
                const toast = document.getElementById('toast-back');
                toast.classList.remove('opacity-0');
                setTimeout(() => { toast.classList.add('opacity-0'); backPressed = false; }, 2000);
            } else { history.back(); }
        });

        const dropIndicator = document.createElement('div');
        dropIndicator.id = 'drop-indicator';
        dropIndicator.className = 'h-1 bg-blue-500 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.8)] pointer-events-none hidden transition-all duration-75';

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                user = session.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                await inicializarDatos();
            } else {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                const errEl = document.getElementById('auth-error');
                errEl.innerText = error.message;
                errEl.classList.remove('hidden');
            } else {
                user = data.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('loading-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                await inicializarDatos();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            user = null; notas = []; etiquetasBD = []; tablerosBD = [];
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        async function inicializarDatos() {
            // Cargar Tableros
            const resTab = await supabaseClient.from('tableros').select('*').order('orden', { ascending: true });
            if (!resTab.error) {
                tablerosBD = resTab.data;
                if (tablerosBD.length === 0) {
                    const iniciales = [
                        { nombre: 'todo', orden: 0, user_id: user.id },
                        { nombre: 'general', orden: 1, user_id: user.id },
                        { nombre: 'cerrado', orden: 2, user_id: user.id }
                    ];
                    await supabaseClient.from('tableros').insert(iniciales);
                    const refreshTab = await supabaseClient.from('tableros').select('*').order('orden', { ascending: true });
                    tablerosBD = refreshTab.data;
                }
            }
            renderizarMenuTableros();

            // Cargar Etiquetas
            const resEtq = await supabaseClient.from('etiquetas').select('*');
            if (!resEtq.error) {
                etiquetasBD = resEtq.data;
                if (etiquetasBD.length === 0) {
                    const iniciales = [
                        { nombre: 'Mandala', color: paletas[0], user_id: user.id },
                        { nombre: 'Show', color: paletas[1], user_id: user.id },
                        { nombre: 'Rutina', color: paletas[2], user_id: user.id }
                    ];
                    await supabaseClient.from('etiquetas').insert(iniciales);
                    const refresh = await supabaseClient.from('etiquetas').select('*');
                    etiquetasBD = refresh.data;
                }
            }
            renderizarEtiquetasDOM();

            const resNotas = await supabaseClient.from('notas').select('*');
            if (!resNotas.error) { notas = resNotas.data; renderizarUI(); }
            document.getElementById('loading-screen').classList.add('hidden');
        }

        // --- GESTIÓN TABLEROS ---
        function abrirGestorTableros() { document.getElementById('modal-gestor-tableros').classList.remove('hidden'); }
        function cerrarGestorTableros() { document.getElementById('modal-gestor-tableros').classList.add('hidden'); }

        function renderizarMenuTableros() {
            const lista = document.getElementById('lista-gestor-tableros');
            lista.innerHTML = tablerosBD.map(t => `
                <div class="flex justify-between items-center bg-[#15181e] p-2 rounded border border-slate-700">
                    <span class="text-sm font-medium text-slate-300 px-2 uppercase tracking-wide">${t.nombre}</span>
                    <div class="flex gap-2">
                        <button onclick="editarTableroBD('${t.id}', '${t.nombre}')" class="text-blue-400 hover:text-blue-300 text-xs font-bold">Editar</button>
                        <button onclick="eliminarTableroBD('${t.id}', '${t.nombre}')" class="text-red-400 hover:text-red-300 text-xs font-bold">Borrar</button>
                    </div>
                </div>
            `).join('');

            const selectEditar = document.getElementById('tablero-editar');
            if(selectEditar) selectEditar.innerHTML = tablerosBD.map(t => `<option value="${t.nombre}">${t.nombre.toUpperCase()}</option>`).join('');
        }

        async function crearTableroBD() {
            const input = document.getElementById('nuevo-tablero-nombre');
            const nombre = input.value.trim().toLowerCase();
            if (!nombre || tablerosBD.some(t => t.nombre === nombre)) return;

            const nuevo = { nombre, orden: tablerosBD.length, user_id: user.id };
            const { data, error } = await supabaseClient.from('tableros').insert([nuevo]).select();
            if (!error && data) {
                tablerosBD.push(data[0]);
                input.value = '';
                renderizarMenuTableros();
                renderizarUI();
            }
        }

        async function editarTableroBD(id, nombreAnterior) {
            const nuevo = prompt("Nuevo nombre del tablero:", nombreAnterior);
            if (!nuevo || nuevo.trim() === '' || nuevo.toLowerCase() === nombreAnterior) return;
            const limpio = nuevo.trim().toLowerCase();

            const { error } = await supabaseClient.from('tableros').update({ nombre: limpio }).eq('id', id);
            if (!error) {
                const idx = tablerosBD.findIndex(t => t.id === id);
                if (idx > -1) tablerosBD[idx].nombre = limpio;

                const afectadas = notas.filter(n => n.tablero === nombreAnterior);
                for (let nota of afectadas) {
                    nota.tablero = limpio;
                    await supabaseClient.from('notas').update({ tablero: limpio }).eq('id', nota.id);
                }
                renderizarMenuTableros();
                renderizarUI();
            }
        }

        async function eliminarTableroBD(id, nombre) {
            if (tablerosBD.length <= 1) { alert("Debe quedar al menos un tablero."); return; }
            if (!confirm(`¿Borrar el tablero "${nombre}"? Las notas que contenga se moverán al primer tablero disponible.`)) return;

            const { error } = await supabaseClient.from('tableros').delete().eq('id', id);
            if (!error) {
                tablerosBD = tablerosBD.filter(t => t.id !== id);
                const tableroReemplazo = tablerosBD[0].nombre;

                const afectadas = notas.filter(n => n.tablero === nombre);
                for (let nota of afectadas) {
                    nota.tablero = tableroReemplazo;
                    await supabaseClient.from('notas').update({ tablero: tableroReemplazo }).eq('id', nota.id);
                }
                renderizarMenuTableros();
                renderizarUI();
            }
        }

        // --- GESTIÓN ETIQUETAS ---
        function renderizarEtiquetasDOM() {
            const select = document.getElementById('filtro-etiqueta');
            const valorActual = select.value;
            let opcionesHTML = `<option value="todas">Todas las etiquetas</option><option value="sin-etiqueta">Sin Etiqueta</option>`;
            etiquetasBD.forEach(e => opcionesHTML += `<option value="${e.nombre}">${e.nombre}</option>`);
            select.innerHTML = opcionesHTML;
            if (etiquetasBD.some(e => e.nombre === valorActual) || valorActual === 'todas' || valorActual === 'sin-etiqueta') select.value = valorActual;

            let htmlCrear = ''; let htmlEditar = '';
            etiquetasBD.forEach(e => {
                htmlCrear += `<label class="cursor-pointer select-none"><input type="checkbox" class="etiqueta-crear peer hidden" value="${e.nombre}"><div class="px-2 py-1 rounded text-xs font-medium border text-slate-400 border-slate-700 peer-checked:${e.color.split(' ').join(' peer-checked:')} transition-all hover:bg-slate-800">${e.nombre}</div></label>`;
                htmlEditar += `<label class="cursor-pointer select-none"><input type="checkbox" class="etiqueta-editar peer hidden" value="${e.nombre}"><div class="px-2 py-1 rounded text-xs font-medium border text-slate-400 border-slate-700 peer-checked:${e.color.split(' ').join(' peer-checked:')} transition-all hover:bg-slate-800">${e.nombre}</div></label>`;
            });

            const especialCrear = `<div class="h-5 w-px bg-slate-700 mx-1 hidden md:block"></div><label class="cursor-pointer select-none"><input type="checkbox" id="check-urgente-crear" class="peer hidden"><div class="px-2 py-1 rounded text-xs font-bold border border-red-500/20 text-red-400 bg-red-500/5 peer-checked:bg-red-900/80 peer-checked:text-red-200 peer-checked:border-red-600 transition-all hover:bg-red-500/10">🚨 Urgente</div></label>`;
            const especialEditar = `<div class="h-5 w-px bg-slate-700 mx-1 hidden md:block"></div><label class="cursor-pointer select-none"><input type="checkbox" id="check-urgente-editar" class="peer hidden"><div class="px-2 py-1 rounded text-xs font-bold border border-red-500/20 text-red-400 bg-red-500/5 peer-checked:bg-red-900/80 peer-checked:text-red-200 peer-checked:border-red-600 transition-all hover:bg-red-500/10">🚨 Urgente</div></label>`;

            document.getElementById('contenedor-etiquetas-crear').innerHTML = htmlCrear + especialCrear;
            document.getElementById('contenedor-etiquetas-editar').innerHTML = htmlEditar + especialEditar;

            const listaGestor = document.getElementById('lista-gestor-etiquetas');
            listaGestor.innerHTML = etiquetasBD.map(e => `
                <div class="flex justify-between items-center bg-[#15181e] p-2 rounded border border-slate-700">
                    <span class="text-sm font-medium ${e.color} px-2 py-0.5 rounded border">${e.nombre}</span>
                    <div class="flex gap-2">
                        <button onclick="editarEtiquetaBD('${e.id}', '${e.nombre}')" class="text-blue-400 hover:text-blue-300 text-xs font-bold">Editar</button>
                        <button onclick="eliminarEtiquetaBD('${e.id}', '${e.nombre}')" class="text-red-400 hover:text-red-300 text-xs font-bold">Borrar</button>
                    </div>
                </div>
            `).join('');
        }
        function abrirGestorEtiquetas() { document.getElementById('modal-gestor-etiquetas').classList.remove('hidden'); }
        function cerrarGestorEtiquetas() { document.getElementById('modal-gestor-etiquetas').classList.add('hidden'); }

        async function crearEtiquetaBD() {
            const input = document.getElementById('nueva-etiqueta-nombre');
            const nombre = input.value.trim();
            if (!nombre || etiquetasBD.some(e => e.nombre.toLowerCase() === nombre.toLowerCase())) return;
            const colorRandom = paletas[Math.floor(Math.random() * paletas.length)];
            const { data, error } = await supabaseClient.from('etiquetas').insert([{ nombre, color: colorRandom, user_id: user.id }]).select();
            if (!error) { etiquetasBD.push(data[0]); input.value = ''; renderizarEtiquetasDOM(); renderizarUI(); }
        }

        async function editarEtiquetaBD(id, nombreAnterior) {
            const limpio = prompt("Editar etiqueta:", nombreAnterior)?.trim();
            if (!limpio || limpio === nombreAnterior) return;
            const { error } = await supabaseClient.from('etiquetas').update({ nombre: limpio }).eq('id', id);
            if (!error) {
                etiquetasBD.find(e => e.id === id).nombre = limpio;
                notas.filter(n => n.etiquetas?.includes(nombreAnterior)).forEach(async n => {
                    n.etiquetas = n.etiquetas.map(e => e === nombreAnterior ? limpio : e);
                    await supabaseClient.from('notas').update({ etiquetas: n.etiquetas }).eq('id', n.id);
                });
                renderizarEtiquetasDOM(); renderizarUI();
            }
        }

        async function eliminarEtiquetaBD(id, nombre) {
            if (!confirm(`¿Borrar "${nombre}"?`)) return;
            const { error } = await supabaseClient.from('etiquetas').delete().eq('id', id);
            if (!error) {
                etiquetasBD = etiquetasBD.filter(e => e.id !== id);
                notas.filter(n => n.etiquetas?.includes(nombre)).forEach(async n => {
                    n.etiquetas = n.etiquetas.filter(e => e !== nombre);
                    await supabaseClient.from('notas').update({ etiquetas: n.etiquetas }).eq('id', n.id);
                });
                renderizarEtiquetasDOM(); renderizarUI();
            }
        }

        // --- NOTAS ---
        function abrirModalCrear() { document.getElementById('modal-crear').classList.remove('hidden'); setTimeout(() => quill.focus(), 100); }
        function cerrarModalCrear() {
            document.getElementById('modal-crear').classList.add('hidden');
            quill.setContents([]); document.getElementById('titulo-crear').value = '';
            document.querySelectorAll('.etiqueta-crear').forEach(cb => cb.checked = false);
            if(document.getElementById('check-urgente-crear')) document.getElementById('check-urgente-crear').checked = false;
        }

        async function agregarNota() {
            const textoPlano = quill.getText().trim();
            const tituloInput = document.getElementById('titulo-crear').value.trim();
            if (textoPlano === '' && tituloInput === '') return;

            const etiquetasSeleccionadas = Array.from(document.querySelectorAll('.etiqueta-crear:checked')).map(cb => cb.value);
            const isUrgente = document.getElementById('check-urgente-crear')?.checked;
            
            let tableroInicial = tablerosBD[0]?.nombre || 'general';
            if (isUrgente) etiquetasSeleccionadas.push('Urgente');
            // Si es urgente, intenta mandarlo a 'todo' si existe, sino al primero
            if (isUrgente && tablerosBD.some(t => t.nombre === 'todo')) tableroInicial = 'todo';

            const nueva = {
                titulo: tituloInput || `Nota ${notas.length + 1}`, texto: quill.root.innerHTML,
                tablero: tableroInicial, etiquetas: etiquetasSeleccionadas, orden: 0, user_id: user.id
            };
            const { data, error } = await supabaseClient.from('notas').insert([nueva]).select();
            if (!error && data) { notas.push(data[0]); renderizarUI(); cerrarModalCrear(); }
        }

        async function eliminarNota(id, event) {
            event.stopPropagation(); notas = notas.filter(n => n.id !== id); renderizarUI();
            await supabaseClient.from('notas').delete().eq('id', id);
        }

        function abrirModalEdicion(id) {
            const nota = notas.find(n => n.id === id);
            if (!nota) return;
            idNotaEditando = id;
            document.getElementById('titulo-editar').value = nota.titulo || '';
            document.getElementById('tablero-editar').value = nota.tablero;
            editQuill.clipboard.dangerouslyPasteHTML(nota.texto || '');

            document.querySelectorAll('.etiqueta-editar').forEach(cb => cb.checked = false);
            if(document.getElementById('check-urgente-editar')) document.getElementById('check-urgente-editar').checked = false;

            nota.etiquetas?.forEach(etq => {
                if (etq === 'Urgente') document.getElementById('check-urgente-editar').checked = true;
                else { const cb = document.querySelector(`.etiqueta-editar[value="${etq}"]`); if (cb) cb.checked = true; }
            });
            document.getElementById('modal-edicion').classList.remove('hidden');
        }

        function cerrarModalEdicion() {
            document.getElementById('modal-edicion').classList.add('hidden'); idNotaEditando = null;
            document.getElementById('titulo-editar').value = ''; editQuill.setContents([]);
        }

        async function guardarEdicion() {
            if (!idNotaEditando) return;
            const index = notas.findIndex(n => n.id === idNotaEditando);
            if (index === -1) return;

            const esUrgente = document.getElementById('check-urgente-editar')?.checked;
            const etiquetasSeleccionadas = Array.from(document.querySelectorAll('.etiqueta-editar:checked')).map(cb => cb.value);
            if (esUrgente) etiquetasSeleccionadas.push('Urgente');

            let tableroFinal = document.getElementById('tablero-editar').value;
            if (esUrgente && tablerosBD.some(t => t.nombre === 'todo')) tableroFinal = 'todo';

            const cambioTablero = notas[index].tablero !== tableroFinal;
            notas[index].titulo = document.getElementById('titulo-editar').value.trim() || 'Nota sin título';
            notas[index].texto = editQuill.root.innerHTML;
            notas[index].etiquetas = etiquetasSeleccionadas;
            notas[index].tablero = tableroFinal;

            renderizarUI();
            await supabaseClient.from('notas').update({ 
                titulo: notas[index].titulo, texto: notas[index].texto, 
                etiquetas: notas[index].etiquetas, tablero: tableroFinal 
            }).eq('id', idNotaEditando);

            if(cambioTablero) actualizarOrdenLocalYBD(tableroFinal);
            cerrarModalEdicion();
        }

        function limpiarFiltros() { document.getElementById('filtro-etiqueta').value = 'todas'; document.getElementById('filtro-urgente').checked = false; document.getElementById('buscador').value = ''; renderizarUI(); }

        // --- UI ---
        function renderizarUI() {
            const container = document.getElementById('tableros-container');
            container.innerHTML = '';
            const contadores = {};

            tablerosBD.forEach(tab => {
                contadores[tab.nombre] = 0;
                let isMobileHidden = window.innerWidth < 768 && tab.nombre !== tablerosBD[0].nombre ? 'hidden md:flex' : 'flex';
                
                // Colorización base de títulos
                let tituloColor = 'text-slate-300';
                if(tab.nombre === 'todo') tituloColor = 'text-yellow-200';
                if(tab.nombre === 'cerrado') tituloColor = 'text-green-400';

                container.innerHTML += `
                    <div id="wrapper-${tab.nombre}" class="bg-[#15181e] rounded-xl w-full md:min-w-[300px] md:w-80 flex flex-col md:max-h-full border border-slate-800/50">
                        <div class="flex items-center justify-between p-3 cursor-pointer md:cursor-default bg-slate-800/30 rounded-t-xl" onclick="toggleMobile('${tab.nombre}')">
                            <h2 class="font-semibold ${tituloColor} text-sm select-none uppercase tracking-wider">${tab.nombre}</h2>
                            <span id="count-${tab.nombre}" class="bg-slate-800 text-slate-400 text-xs px-2 py-0.5 rounded-full font-medium">0</span>
                        </div>
                        <div id="${tab.nombre}" class="column ${isMobileHidden} flex-col gap-3 p-3 overflow-y-auto" ondragover="permitirSoltar(event)" ondrop="soltar(event)"></div>
                    </div>
                `;
            });

            const filtroUrgente = document.getElementById('filtro-urgente').checked;
            const filtroEtiqueta = document.getElementById('filtro-etiqueta').value;
            const term = document.getElementById('buscador').value.toLowerCase();
            const tempDiv = document.createElement('div');
            const hayFiltros = filtroUrgente || filtroEtiqueta !== 'todas' || term !== '';

            notas.sort((a, b) => (a.orden || 0) - (b.orden || 0) || new Date(b.created_at) - new Date(a.created_at));

            notas.forEach(nota => {
                if (filtroUrgente && !nota.etiquetas?.includes('Urgente')) return;
                if (filtroEtiqueta === 'sin-etiqueta' && nota.etiquetas?.length > 0) return;
                if (filtroEtiqueta !== 'todas' && filtroEtiqueta !== 'sin-etiqueta' && !nota.etiquetas?.includes(filtroEtiqueta)) return;

                if (term) {
                    tempDiv.innerHTML = nota.texto;
                    if (!tempDiv.innerText.toLowerCase().includes(term) && !(nota.titulo || '').toLowerCase().includes(term) && !nota.etiquetas?.some(e => e.toLowerCase().includes(term))) return;
                }

                if(contadores[nota.tablero] !== undefined) contadores[nota.tablero]++;

                const el = document.createElement('div');
                el.className = 'nota-item bg-[#1a1d24] p-3 rounded-lg shadow-sm border border-slate-700/60 cursor-grab hover:border-slate-500 transition-all group relative flex flex-col';
                el.draggable = true; el.id = nota.id; el.ondragstart = arrastrar;

                let htmlEtiquetas = nota.etiquetas?.length > 0 ? '<div class="flex flex-wrap gap-1.5 mb-2">' + nota.etiquetas.map(etq => etq === 'Urgente' ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border border-red-500 text-red-400 bg-red-900/50">🚨 Urgente</span>` : `<span class="text-[10px] font-medium px-1.5 py-0.5 rounded border ${etiquetasBD.find(e=>e.nombre===etq)?.color || 'bg-slate-700 text-slate-300 border-slate-600'}">${etq}</span>`).join('') + '</div>' : '';

                el.innerHTML = `
                    ${htmlEtiquetas}
                    <div onclick="abrirModalEdicion('${nota.id}')" class="cursor-pointer hover:bg-slate-800/50 rounded transition-colors -ml-1 p-1">
                        <h4 class="font-bold text-slate-100 text-sm mb-1">${nota.titulo || 'Nota sin título'}</h4>
                        <div class="text-slate-400 text-xs break-words nota-contenido leading-relaxed line-clamp-2 pointer-events-none">${nota.texto}</div>
                    </div>
                    <button onclick="eliminarNota('${nota.id}', event)" class="absolute top-2 right-2 text-slate-500 hover:text-red-400 bg-[#1a1d24] rounded-md opacity-0 group-hover:opacity-100 transition-opacity p-1.5 shadow-sm border border-slate-700/50"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                `;
                const col = document.getElementById(nota.tablero);
                if (col) col.appendChild(el);
            });

            tablerosBD.forEach(tab => {
                const badge = document.getElementById(`count-${tab.nombre}`);
                if(badge) badge.innerText = contadores[tab.nombre];
                const wrap = document.getElementById(`wrapper-${tab.nombre}`);
                if(wrap) wrap.style.display = (hayFiltros && contadores[tab.nombre] === 0) ? 'none' : '';
            });
        }

        // --- SCROLL Y DRAG & DROP ---
        let scrollInterval;
        document.addEventListener('dragover', (e) => {
            const mainApp = document.getElementById('main-app');
            if (!mainApp) return;
            clearInterval(scrollInterval);
            if (e.clientY < 100) scrollInterval = setInterval(() => mainApp.scrollBy(0, -15), 20);
            else if (window.innerHeight - e.clientY < 100) scrollInterval = setInterval(() => mainApp.scrollBy(0, 15), 20);
        });
        document.addEventListener('dragend', (e) => {
            clearInterval(scrollInterval);
            if (e.target && e.target.classList) e.target.classList.remove('dragging');
            dropIndicator.classList.add('hidden');
            if (dropIndicator.parentNode) dropIndicator.parentNode.removeChild(dropIndicator);
        });

        function arrastrar(event) { event.dataTransfer.setData("text", event.target.id); event.target.classList.add('dragging'); }
        function permitirSoltar(event) { 
            event.preventDefault(); 
            const col = event.target.closest('.column');
            const arrastrado = document.querySelector('.dragging');
            if (!col || !arrastrado) return;

            dropIndicator.classList.remove('hidden');
            const nota = event.target.closest('.nota-item');
            if (nota && nota !== arrastrado) {
                const offset = event.clientY - nota.getBoundingClientRect().top;
                nota.parentNode.insertBefore(dropIndicator, offset > nota.offsetHeight / 2 ? nota.nextSibling : nota);
            } else if (col && !nota && event.target === col) col.appendChild(dropIndicator);
        }
        function soltar(event) {
            event.preventDefault();
            const id = event.dataTransfer.getData("text");
            const arrastrado = document.getElementById(id);
            if (!arrastrado || !dropIndicator.parentNode) return;
            
            arrastrado.classList.remove('dragging');
            const col = dropIndicator.closest('.column');
            dropIndicator.parentNode.insertBefore(arrastrado, dropIndicator);
            dropIndicator.remove();
            if (col) actualizarOrdenLocalYBD(col.id);
        }

        async function actualizarOrdenLocalYBD(tableroId) {
            const col = document.getElementById(tableroId);
            if(!col) return;
            let promesas = [];
            Array.from(col.querySelectorAll('.nota-item')).forEach((item, i) => {
                const nota = notas.find(n => n.id === item.id);
                if (nota && (nota.tablero !== tableroId || nota.orden !== i)) {
                    nota.tablero = tableroId; nota.orden = i;
                    promesas.push(supabaseClient.from('notas').update({ tablero: tableroId, orden: i }).eq('id', nota.id));
                }
            });
            renderizarUI(); 
            if(promesas.length) await Promise.all(promesas);
        }

        function toggleMobile(id) {
            if (window.innerWidth >= 768) return; 
            const col = document.getElementById(id);
            if (col.classList.contains('hidden')) { col.classList.remove('hidden'); col.classList.add('flex'); } 
            else { col.classList.add('hidden'); col.classList.remove('flex'); }
        }

        checkSession();
    </script>
</body>
</html>
